# Publish packages to pub.dev from GitHub-hosted runners
# (use when local network is geo-blocked from pub.dev uploads).
#
# Setup:
# 1. On pub.dev → Account → Create a publisher-authorized token (or login credentials).
# 2. Store as repository secret PUB_CREDENTIALS with the contents of
#    ~/.config/dart/pub-credentials.json (or ~/.pub-cache/credentials.json).
# 3. Run this workflow manually (workflow_dispatch).

name: Publish to pub.dev

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Write pub credentials
        run: |
          mkdir -p "$HOME/.config/dart"
          printenv PUB_CREDENTIALS > "$HOME/.config/dart/pub-credentials.json"
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}

      - name: Publish in dependency order
        run: |
          set -euo pipefail
          publish() {
            echo "::group::Publish $1"
            (cd "packages/$1" && dart pub publish --force)
            echo "::endgroup::"
          }

          publish flow_widget_annotation
          publish flow_widget_platform_interface

          publish flow_widget_android
          publish flow_widget_ios
          publish flow_widget_macos
          publish flow_widget_windows
          publish flow_widget_linux
          publish flow_widget_wear
          publish flow_widget_watchos

          publish flow_widget_generator
          publish flow_widget_cli

          publish flow_widget
