name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: |
          for pkg in packages/* example; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              echo "::group::analyze $pkg"
              (cd "$pkg" && dart analyze --fatal-infos)
              echo "::endgroup::"
            fi
          done

      - name: Test
        run: |
          for pkg in packages/flow_widget_platform_interface packages/flow_widget packages/flow_widget_cli packages/flow_widget_generator packages/flow_widget_annotation; do
            if [ -d "$pkg/test" ]; then
              echo "::group::test $pkg"
              (cd "$pkg" && dart test)
              echo "::endgroup::"
            fi
          done

      - name: Example flutter test
        run: |
          cd example
          flutter test

  coverage:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Platform interface coverage
        run: |
          cd packages/flow_widget_platform_interface
          flutter test --coverage
          if [ -f coverage/lcov.info ]; then
            echo "Coverage artifact ready"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: "**/coverage/lcov.info"
          if-no-files-found: ignore
