# CI on PRs/main; publish to pub.dev on version tags (e.g. v1.0.4).
#
# pub.dev auth (prefer one):
# 1. Repository secret PUB_CREDENTIALS = contents of ~/.config/dart/pub-credentials.json
# 2. Or GitHub OIDC via flutter-actions/setup-pubdev-credentials (requires pub.dev
#    publisher linked to this GitHub repo and id-token: write).

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      # Must match the tag pattern configured on pub.dev (e.g. v{{version}}).
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          for pkg in packages/* example; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              echo "::group::pub get $pkg"
              (cd "$pkg" && flutter pub get)
              echo "::endgroup::"
            fi
          done

      - name: Check formatting
        run: dart format .

      - name: Analyze
        run: |
          for pkg in packages/* example; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              echo "::group::analyze $pkg"
              (cd "$pkg" && dart analyze --fatal-infos)
              echo "::endgroup::"
            fi
          done

      - name: Test
        run: |
          for pkg in packages/flow_widget_platform_interface packages/flow_widget packages/flow_widget_cli packages/flow_widget_generator packages/flow_widget_annotation; do
            if [ -d "$pkg/test" ]; then
              echo "::group::test $pkg"
              if grep -q 'sdk: flutter' "$pkg/pubspec.yaml"; then
                (cd "$pkg" && flutter test)
              else
                (cd "$pkg" && dart test)
              fi
              echo "::endgroup::"
            fi
          done

      - name: Example flutter test
        working-directory: example
        run: flutter test

  # Runs only on version tag pushes (e.g. v1.0.4), not on main/PR pushes.
  #
  # Monorepo note: packages often have different versions, so a single tag like
  # v1.0.4 cannot satisfy pub.dev OIDC's per-package `v{{version}}` check.
  # Publish therefore requires the PUB_CREDENTIALS repository secret
  # (~/.config/dart/pub-credentials.json from `dart pub login`).
  publish:
    name: Publish to pub.dev
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Authenticate with pub.dev
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -z "${PUB_CREDENTIALS:-}" ]; then
            echo "::error::PUB_CREDENTIALS secret is missing."
            echo "For this monorepo, OIDC cannot publish packages whose versions"
            echo "differ from the git tag (e.g. tag v1.0.4 vs package 1.0.1)."
            echo "Add repository secret PUB_CREDENTIALS with the contents of"
            echo "~/.config/dart/pub-credentials.json (from dart pub login)."
            exit 1
          fi
          mkdir -p "$HOME/.config/dart" "$HOME/.pub-cache"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.config/dart/pub-credentials.json"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.pub-cache/credentials.json"
          echo "Authenticated with PUB_CREDENTIALS secret."

      - name: Publish packages in dependency order
        run: |
          set -euo pipefail
          publish() {
            local pkg="$1"
            echo "::group::Publish $pkg"
            local version
            version="$(awk '/^version:/{print $2; exit}' "packages/$pkg/pubspec.yaml")"
            local status
            status="$(curl -s -o /dev/null -w '%{http_code}' \
              "https://pub.dev/api/packages/$pkg/versions/$version")"
            if [ "$status" = "200" ]; then
              echo "Already on pub.dev: $pkg $version — continuing"
              echo "::endgroup::"
              return 0
            fi
            (cd "packages/$pkg" && flutter pub publish --force)
            echo "::endgroup::"
          }

          publish flow_widget_annotation
          publish flow_widget_platform_interface

          publish flow_widget_android
          publish flow_widget_ios
          publish flow_widget_macos
          publish flow_widget_windows
          publish flow_widget_linux
          publish flow_widget_wear
          publish flow_widget_watchos

          publish flow_widget_generator
          publish flow_widget_cli

          publish flow_widget
