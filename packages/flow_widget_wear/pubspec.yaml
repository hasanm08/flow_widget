name: flow_widget_wear
description: >
  Wear OS Tiles companion package for flow_widget. Add this to your Wear OS
  module — do not use as a replacement for flow_widget_android on phones.
version: 1.0.0
homepage: https://github.com/hasanm08/flow_widget
repository: https://github.com/hasanm08/flow_widget
issue_tracker: https://github.com/hasanm08/flow_widget/issues
topics:
  - wear-os
  - tiles
  - widget

environment:
  sdk: ^3.12.2
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flow_widget_platform_interface: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.flowwidget.wear
        pluginClass: FlowWidgetWearPlugin
