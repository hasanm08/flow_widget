name: flow_widget_android
description: Android implementation of the flow_widget federated plugin.
version: 1.0.2
homepage: https://github.com/hasanm08/flow_widget
repository: https://github.com/hasanm08/flow_widget
issue_tracker: https://github.com/hasanm08/flow_widget/issues
topics:
  - widget
  - home-widget
  - android

environment:
  sdk: ^3.12.2
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flow_widget_platform_interface: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: flow_widget
    platforms:
      android:
        package: dev.flowwidget.android
        pluginClass: FlowWidgetPlugin
